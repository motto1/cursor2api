services:
  cursor2api:
    image: ${CURSOR2API_IMAGE:-ghcr.io/motto1/cursor2api:latest}
    container_name: cursor2api
    restart: unless-stopped
    ports:
      - "3010:3010"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3010
      - TIMEOUT=120
      - ADMIN_ENABLED=true
      - ADMIN_PATH=/admin
      - OBS_ENABLED=true
      - OBS_MAX_REQUESTS=500
      - OBS_LOG_DIR=./data
      - OBS_PERSIST_JSONL=true
      # ⚠️ 部署到海外机器无需代理，如果在国内云，取消注释并填入你的本机 http/socks 代理
      # - PROXY=http://host.docker.internal:7890
      
      # [可选环境变量] 以下变量如果你在此声明，将会覆盖 config.yaml 的配置逻辑：
      # - CURSOR_MODEL=anthropic/claude-sonnet-4.6
      # - FP=ey...
