services:
  cursor2api-core:
    image: ${CURSOR2API_CORE_IMAGE:-ghcr.io/motto1/cursor2api:latest}
    container_name: cursor2api-core
    restart: unless-stopped
    expose:
      - "3010"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - NODE_ENV=production
      - PORT=3010
      - TIMEOUT=120
      # ⚠️ 部署到海外机器无需代理，如果在国内云，取消注释并填入你的本机 http/socks 代理
      # - PROXY=http://host.docker.internal:7890
      
      # [可选环境变量] 以下变量如果你在此声明，将会覆盖 config.yaml 的配置逻辑：
      # - CURSOR_MODEL=anthropic/claude-sonnet-4.6
      # - FP=ey...

  cursor2api-admin:
    image: ${CURSOR2API_ADMIN_IMAGE:-ghcr.io/motto1/cursor2api-admin:latest}
    container_name: cursor2api-admin
    restart: unless-stopped
    depends_on:
      - cursor2api-core
    ports:
      - "3010:3010"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3010
      - UPSTREAM_BASE_URL=http://cursor2api-core:3010
      - ADMIN_PATH=/admin
      - OBS_ENABLED=true
      - OBS_MAX_REQUESTS=500
      - OBS_LOG_DIR=/app/data
      - OBS_PERSIST_JSONL=true
