<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor2API Admin UI</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div>
        <p class="eyebrow">Cursor2API</p>
        <h1>管理面板</h1>
        <p class="muted">零依赖静态前端，等待后端 `/admin/api/*` 接入。</p>
      </div>

      <section class="panel compact">
        <label class="field-label" for="base-url">API Base URL</label>
        <input id="base-url" class="input" type="text" placeholder="例如 http://localhost:3010">
        <div class="button-row">
          <button id="save-base-url" class="button primary">保存</button>
          <button id="load-demo" class="button ghost">演示数据</button>
        </div>
      </section>

      <nav class="nav" aria-label="主导航">
        <a href="#overview" data-view-link="overview" class="is-active">概览</a>
        <a href="#endpoints" data-view-link="endpoints">接口清单</a>
        <a href="#requests" data-view-link="requests">调用记录</a>
        <a href="#details" data-view-link="details">选中详情</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <p class="eyebrow">Observability</p>
          <h2>代理调用观测台</h2>
        </div>
        <div id="status-pill" class="status-pill is-loading">初始化中</div>
      </header>

      <section id="overview" class="section page-section is-active" data-view="overview">
        <div class="section-head">
          <div>
            <p class="eyebrow">Overview</p>
            <h3>总体指标</h3>
          </div>
          <button id="refresh-all" class="button">刷新数据</button>
        </div>

        <div id="stats-grid" class="stats-grid"></div>
      </section>

      <section id="endpoints" class="section page-section" data-view="endpoints" hidden>
        <div class="section-head">
          <div>
            <p class="eyebrow">Endpoints</p>
            <h3>接口清单</h3>
          </div>
        </div>
        <div class="panel">
          <table>
            <thead>
              <tr>
                <th>名称</th>
                <th>方法</th>
                <th>路径</th>
                <th>来源</th>
              </tr>
            </thead>
            <tbody id="endpoints-body"></tbody>
          </table>
        </div>
      </section>

      <section id="requests" class="section page-section" data-view="requests" hidden>
        <div class="section-head">
          <div>
            <p class="eyebrow">Requests</p>
            <h3>最近调用</h3>
          </div>
          <div class="filters">
            <input id="filter-path" class="input" type="text" placeholder="按路径过滤">
            <select id="filter-status" class="input">
              <option value="">全部状态</option>
              <option value="2">2xx</option>
              <option value="4">4xx</option>
              <option value="5">5xx</option>
            </select>
          </div>
        </div>
        <div class="panel">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>方法</th>
                <th>路径</th>
                <th>状态</th>
                <th>耗时</th>
                <th>模型</th>
              </tr>
            </thead>
            <tbody id="requests-body"></tbody>
          </table>
        </div>
      </section>

      <section id="details" class="section page-section" data-view="details" hidden>
        <div class="section-head">
          <div>
            <p class="eyebrow">Details</p>
            <h3>调用详情</h3>
          </div>
        </div>
        <div id="detail-panel" class="panel detail-panel empty">
          请选择一条调用记录查看详情。
        </div>
      </section>
    </main>
  </div>

  <template id="stat-card-template">
    <article class="stat-card">
      <p class="stat-label"></p>
      <strong class="stat-value"></strong>
      <span class="stat-note"></span>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
